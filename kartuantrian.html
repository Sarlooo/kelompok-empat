<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kartu Antrian</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#e6e6e6;
}

.container{
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:220px;
    height:100vh;
    background:#6b0000;
}

.logo{
    padding:20px;
    font-weight:bold;
    font-size:18px;
}

.menu{
    list-style:none;
    padding:0;
}

.menu li{
    padding:15px 20px;
}

.menu li:hover{
    background:#8b0000;
    cursor:pointer;
}

.active{
    background:white;
    color:black;
}

/* MAIN */

.main{
    flex:1;
}

.header{
    background:#b30000;
    color:white;
    text-align:center;
    padding:20px;
    font-size:20px;
    font-weight:bold;
}

/* CARD */

.card-container{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:80px;
}

.card{
    background:#b30000;
    width:280px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    color:white;
}

.inner-card{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    margin-top:15px;
}

.ticket{
    background:black;
    color:white;
    font-size:30px;
    padding:10px 25px;
    margin-top:10px;
    display:inline-block;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">Horizon Service Center</div>

        <ul class="menu">
            <li>Ambil Antrian</li>
            <li>Daftar Antrian</li>
            <li class="active">Kartu Antrian</li>
        </ul>
    </div>


    <!-- MAIN -->
    <div class="main">

        <div class="header">
            KARTU ANTRIAN
        </div>


        <div class="card-container">

            <!-- HARI INI -->
            <div class="card">
                <h3>Nomor Antrian</h3>

                <div class="inner-card">
                    <p>No. Telepon : 085866022278</p>
                    <p>Hari Ini</p>

                    <div class="ticket">
                        005
                    </div>
                </div>
            </div>


            <!-- BESOK -->
            <div class="card">
                <h3>Nomor Antrian</h3>

                <div class="inner-card">
                    <p>No. Telepon : 085866022278</p>
                    <p>Besok</p>

                    <div class="ticket">
                        001
                    </div>
                </div>
            </div>


        </div>

    </div>

</div>

</body>
</html>
