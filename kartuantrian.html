<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kartu Antrian</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
display:flex;
height:100vh;
background:#d9d9d9;
background-image: radial-gradient(#cfcfcf 2px, transparent 2px);
background-size:40px 40px;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#6b0000;
color:white;
display:flex;
flex-direction:column;
}

.logo{
padding:20px;
text-align:center;
}

.logo img{
width:150px;
}

.menu{
list-style:none;
margin-top:40px;
}

.menu li{
padding:18px 25px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.menu li:hover{
background:#ffffff;
}

.active{
background:#6b0000;
color:#ffffff;
}

/* FOOTER SIDEBAR */

.sidebar-footer{
margin-top:auto;
height:60px;
background:linear-gradient(to top,#990000,transparent);
clip-path:polygon(0% 100%,20% 70%,40% 90%,60% 60%,80% 85%,100% 70%,100% 100%);
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#b30000;
color:white;
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
letter-spacing:2px;
}

/* CARD */

.card-container{
display:flex;
justify-content:center;
align-items:center;
gap:80px;
flex:1;
}

.card{
background:#b30000;
width:320px;
padding:35px;
border-radius:20px;
text-align:center;
color:white;
}

.card h3{
margin-bottom:15px;
}

.inner-card{
background:#eaeaea;
color:black;
padding:25px;
border-radius:12px;
}

.inner-card p{
margin:6px 0;
font-size:14px;
}

.ticket{
background:black;
color:white;
font-size:40px;
padding:10px 40px;
margin-top:12px;
display:inline-block;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="images/hsc.jpg">
</div>

<ul class="menu">
<li>Ambil Antrian</li>
<li>Daftar Antrian</li>
<li class="active">Kartu Antrian</li>
</ul>

<div class="sidebar-footer"></div>

</div>


<!-- MAIN -->
<div class="main">

<div class="header">
KARTU ANTRIAN
</div>


<div class="card-container">

<!-- HARI INI -->
<div class="card">

<h3>Nomor Antrian</h3>

<div class="inner-card">
<p>No. Telepon : 085866022278</p>
<p><b>Hari Ini</b></p>

<div class="ticket">
005
</div>

</div>

</div>


<!-- BESOK -->
<div class="card">

<h3>Nomor Antrian</h3>

<div class="inner-card">
<p>No. Telepon : 085866022278</p>
<p><b>Besok</b></p>

<div class="ticket">
001
</div>

</div>

</div>

</div>

</div>

</body>
</html>
